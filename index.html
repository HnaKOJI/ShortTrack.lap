<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ラップ計算</title>
    <style>
        :root{
            --bg:#f5f7fb;
            --card:#ffffff;
            --muted:#6b7280;
            --accent:#2563eb;
            --danger:#ef4444;
            --radius:12px;
            --gap:14px;
        }
        *{box-sizing:border-box}
        body{
            margin:0;
            font-family: "Yu Gothic UI", "Segoe UI", system-ui, -apple-system, "Helvetica Neue", Arial;
            background:var(--bg);
            color:#0f172a;
            padding:20px;
        }

        .container{
            max-width:700px;
            margin:16px auto;
            background:var(--card);
            border-radius:var(--radius);
            box-shadow:0 8px 30px rgba(15,23,42,0.06);
            padding:18px;
            border:1px solid rgba(15,23,42,0.04);
        }

        .header{
            margin-bottom:12px;
        }
        .title{
            font-size:18px;
            font-weight:700;
        }
        .subtitle{
            font-size:13px;
            color:var(--muted);
            margin-top:4px;
        }

        .grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:var(--gap);
            align-items:start;
        }

        .field{
            display:flex;
            flex-direction:column;
            gap:8px;
        }

        .radios, .distance{
            display:flex;
            gap:10px;
            flex-wrap:wrap;
        }

        label{
            font-size:14px;
            cursor:pointer;
            user-select:none;
        }

        label.disabled { opacity:0.45; cursor:default; pointer-events:none; }

        input[type="radio"]{
            accent-color:var(--accent);
            margin-right:6px;
        }

        select,input[type="text"]{
            width:100%;
            padding:10px 12px;
            border-radius:10px;
            border:1px solid #e6eef8;
            background:#fff;
            font-size:14px;
            outline:none;
            box-shadow:inset 0 1px 0 rgba(255,255,255,0.6);
        }
        input[type="text"]::placeholder{color:#c7d2e0}

        .result{
            grid-column:1 / -1;
            display:flex;
            flex-direction:column;
            gap:8px;
            padding:14px;
            border-radius:10px;
            background:linear-gradient(90deg, rgba(37,99,235,0.04), rgba(37,99,235,0.02));
            border:1px solid rgba(37,99,235,0.06);
        }

        #lapResult{
            width:100%;
            font-weight:700;
            font-size:18px;
            text-align:center;
            border:none;
            background:transparent;
            padding:8px 0;
        }

        .hint{
            color:var(--muted);
            font-size:13px;
        }

        @media (max-width:560px){
            .grid{grid-template-columns:1fr}
        }
        /* タイム表用スタイル */
        .time-table { width:100%; border-collapse:collapse; margin-bottom:18px; }
        .time-table th, .time-table td { border:1px solid #ddd; padding:6px 8px; text-align:center; }
        .time-table caption { font-weight:700; margin-bottom:4px; }

        @media (max-width:600px){
            .time-table th, .time-table td { font-size:12px; padding:4px 6px; }
            .time-table caption { font-size:14px; }
        }
    </style>
</head>
<body>
    <div class="container" role="application" aria-label="ラップ計算">
        <div class="header">
            <div class="title">ショートトラック ラップ計算</div>
            <div class="subtitle">性別・バッジ級・距離を選び、スタートタイム（秒）を入力してください</div>
        </div>

        <div class="grid">
            <div class="field">
                <label class="field-label">性別</label>
                <div class="radios" role="radiogroup" aria-label="性別">
                    <label><input type="radio" name="sex" value="男子"> 男子</label>
                    <label><input type="radio" name="sex" value="女子"> 女子</label>
                </div>
            </div>

            <div class="field">
                <label for="gradeSelect">バッジ級</label>
                <select id="gradeSelect" aria-label="級選択">
                    <option value="">選択してください</option>
                    <option value="AAA">AAA</option>
                    <option value="AA">AA</option>
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                    <option value="D">D</option>
                    <option value="E">E</option>
                    <option value="F">F</option>
                </select>
                <div class="hint">例: 男子・AA を選択</div>
            </div>

            <div class="field">
                <label class="field-label">距離</label>
                <div class="distance" role="radiogroup" aria-label="距離">
                    <label><input type="radio" name="distance" value="500m">500m</label>
                    <label><input type="radio" name="distance" value="1000m">1000m</label>
                    <label><input type="radio" name="distance" value="1500m">1500m</label>
                    <label id="label-3000"><input type="radio" name="distance" value="3000m">3000m</label>
                </div>
            </div>

            <div class="field">
                <label for="startTime">スタートタイム（秒）</label>
                <input id="startTime" type="text" placeholder="例: 8.2秒" aria-label="スタートタイム">
                <div class="hint">小数点可。合計タイムから引く秒数です。</div>
            </div>

            <div class="result" aria-live="polite">
                <div class="hint">ラップ = (合計タイム − スタート) ÷ 周数（500:4 / 1000:8 / 1500:13 / 3000:26）</div>
                <input id="lapResult" type="text" readonly aria-label="ラップ結果">
                <!-- 追加: 1周タイム入力と予想級 -->
                <div class="hint" style="margin-top:8px;">1周タイムを入力すると、該当するバッジ級を判定します</div>
                <input id="lapTime" type="text" placeholder="例: 10.0秒(性別と距離の選択とスタートタイムの入力をしてください)" aria-label="1周タイム">
                <div style="display:flex; gap:8px; margin-top:4px;">
                    <input id="gradeResult" type="text" placeholder="予想バッジ級" readonly aria-label="予想バッジ級">
                    <input id="totalTimeResult" type="text" placeholder="合計タイム" readonly aria-label="合計タイム">
                </div>
            </div>
        </div>
    </div>
    <!-- タイム表を表示する領域 -->
    <div id="tablesContainer" class="container"></div>

    <script>
    // 提供いただいたタイム（500,1000,1500,3000 の順）
    const timeData = {
        '男子': {
            'AAA': { '500m': 41.800, '1000m': 86.500, '1500m': 135.800, '3000m': 286.000 },
            'AA':  { '500m': 44.000, '1000m': 91.000, '1500m': 143.000, '3000m': 302.000 },
            'A':   { '500m': 48.000, '1000m': 99.500, '1500m': 156.000, '3000m': 329.000 },
            'B':   { '500m': 53.000, '1000m':110.000, '1500m': 172.000, '3000m': 358.000 },
            'C':   { '500m': 59.000, '1000m':125.000, '1500m': 192.000, '3000m': 392.000 },
            'D':   { '500m': 66.000, '1000m':140.000, '1500m': 215.000 }, // 3000mなし
            'E':   { '500m': 83.000, '1000m':176.000, '1500m': 270.000 },  // 3000mなし
            'F':   { '500m': 85.000, '1000m':221.000, '1500m': 338.000 }   // 3000mなし
        },
        '女子': {
            'AAA': { '500m': 45.000, '1000m': 93.000, '1500m': 145.000, '3000m': 302.000 },
            'AA':  { '500m': 47.000, '1000m': 98.000, '1500m': 153.000, '3000m': 320.000 },
            'A':   { '500m': 51.000, '1000m':107.000, '1500m': 168.000, '3000m': 352.000 },
            'B':   { '500m': 58.000, '1000m':121.000, '1500m': 190.000, '3000m': 398.000 },
            'C':   { '500m': 67.000, '1000m':142.000, '1500m': 218.000, '3000m': 445.000 },
            'D':   { '500m': 78.000, '1000m':165.000, '1500m': 254.000 }, // 3000mなし
            'E':   { '500m': 95.000, '1000m':201.000, '1500m': 309.000 },  // 3000mなし
            'F':   { '500m': 88.000, '1000m':246.000, '1500m': 378.000 }   // 3000mなし
        }
    };

    const laps = { '500m':4, '1000m':8, '1500m':13, '3000m':26 };

    // 表示用に時間をフォーマット
    function formatTime(sec){
        if(!isFinite(sec)) return '';
        if(sec >= 60){
            const m = Math.floor(sec/60);
            const s = (sec - m*60).toFixed(2);
            return `${m}分${s}秒`;
        }
        return sec.toFixed(2) + ' 秒';
    }

    function renderTimeTables(){
        const sexes = ['男子','女子'];
        const grades = ['AAA','AA','A','B','C','D','E','F'];
        const distances = ['500m','1000m','1500m','3000m'];
        let html = '';
        for(const sex of sexes){
            html += `<table class="time-table"><caption>${sex} タイム表</caption><thead><tr><th></th>`;
            for(const d of distances) html += `<th>${d}</th>`;
            html += `</tr></thead><tbody>`;
            for(const g of grades){
                html += `<tr><th>${g}</th>`;
                for(const d of distances){
                    const val = (timeData[sex] && timeData[sex][g] && timeData[sex][g][d]) || null;
                    html += `<td>${val!=null?formatTime(val):''}</td>`;
                }
                html += `</tr>`;
            }
            html += `</tbody></table>`;
        }
        document.getElementById('tablesContainer').innerHTML = html;
    }

    const startInput = document.getElementById('startTime');
    const resultInput = document.getElementById('lapResult');
    const lapTimeInput = document.getElementById('lapTime');
    const gradeResult = document.getElementById('gradeResult');
    const totalTimeResult = document.getElementById('totalTimeResult');

    const sexRadios = document.querySelectorAll('input[name="sex"]');
    const distanceRadios = document.querySelectorAll('input[name="distance"]');
    const gradeSelect = document.getElementById('gradeSelect');
    const label3000 = document.getElementById('label-3000');
    const input3000 = label3000.querySelector('input[type="radio"]');

    function getSelected(nodeList){
        for(const el of nodeList) if(el.checked) return el.value;
        return null;
    }

    function update3000Availability(){
        const sex = getSelected(sexRadios);
        const grade = gradeSelect.value;
        // 3000m が存在するか確認（性別と級が選ばれている必要あり）
        const available = !!(sex && grade && timeData[sex] && timeData[sex][grade] && ('3000m' in timeData[sex][grade]));
        input3000.disabled = !available;
        if(!available){
            label3000.classList.add('disabled');
            if(input3000.checked) input3000.checked = false;
        } else {
            label3000.classList.remove('disabled');
        }
    }

    function computeLap(){
        const sex = getSelected(sexRadios);
        const distance = getSelected(distanceRadios);
        const grade = gradeSelect.value;
        const startSec = parseFloat(startInput.value);

        if(!sex || !grade || !distance){
            resultInput.value = '';
            return;
        }
        if(Number.isNaN(startSec)){
            resultInput.value = 'スタートタイムを秒で入力';
            return;
        }

        const gradeData = timeData[sex] && timeData[sex][grade];
        const raceTime = gradeData ? gradeData[distance] : undefined;
        const lapCount = laps[distance];

        if(raceTime == null || lapCount == null){
            if(distance === '3000m' && gradeData && !('3000m' in gradeData)){
                resultInput.value = '選択した級には3000mのデータがありません';
            } else {
                resultInput.value = 'データなし';
            }
            return;
        }

        const lapSeconds = (raceTime - startSec) / lapCount;
        resultInput.value = isFinite(lapSeconds) ? lapSeconds.toFixed(2) + ' 秒/周' : '計算不可';
    }

    function computeGradePrediction(){
        const sex = getSelected(sexRadios);
        const distance = getSelected(distanceRadios);
        const lapSec = parseFloat(lapTimeInput.value);
        const startSec = parseFloat(startInput.value);

        if(!sex){
            gradeResult.value = '';
            return;
        }
        if(Number.isNaN(lapSec)){
            gradeResult.value = '1周タイムを秒で入力';
            return;
        }
        if(Number.isNaN(startSec)){
            gradeResult.value = 'スタートタイムを秒で入力';
            return;
        }
        const lapCount = distance ? laps[distance] : 4; // 距離未選択時は500mの周数を使用
        // 合計タイム = スタート + 一周 * 周数
        const totalTime = startSec + lapSec * lapCount;
        const gradeOrder = ['AAA','AA','A','B','C','D','E','F'];
        let found = null;
        const gradesForSex = timeData[sex];
        if(gradesForSex){
            for(const g of gradeOrder){
                const data = gradesForSex[g];
                if(data && data[distance || '500m'] != null){
                    if(totalTime <= data[distance || '500m']){
                        found = g;
                        break;
                    }
                }
            }
        }
        gradeResult.value = found ? found : '級外';
        // 合計タイム表示（60秒超は分表示）
        if(isFinite(totalTime)){
            if(totalTime >= 60){
                const mins = Math.floor(totalTime / 60);
                const secs = (totalTime - mins * 60).toFixed(2);
                totalTimeResult.value = `${mins}分${secs}秒`;
            } else {
                totalTimeResult.value = totalTime.toFixed(2) + ' 秒';
            }
        } else {
            totalTimeResult.value = '';
        }
    }

    // イベント
    startInput.addEventListener('input', () => { computeLap(); computeGradePrediction(); });
    lapTimeInput.addEventListener('input', computeGradePrediction);

    gradeSelect.addEventListener('change', () => { update3000Availability(); computeLap(); computeGradePrediction(); });
    sexRadios.forEach(r => r.addEventListener('change', () => { update3000Availability(); computeLap(); computeGradePrediction(); }));
    distanceRadios.forEach(r => r.addEventListener('change', () => { computeLap(); computeGradePrediction(); }));

    // 初期反映
    renderTimeTables();
    update3000Availability();
    computeGradePrediction();
    </script>
</body>
</html>
